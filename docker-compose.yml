version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pcd_ids_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    environment:
      - ENVIRONMENT=development
      - CORS_ORIGINS=*
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pcd_ids_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
